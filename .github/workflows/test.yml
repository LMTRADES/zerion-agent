name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: node --test tests/unit/agent-engine.test.mjs tests/unit/cli-and-final.test.mjs tests/unit/final-batch.test.mjs tests/unit/final-push.test.mjs tests/unit/privacy.test.mjs tests/unit/final-edge-push.test.mjs

      - name: Run integration tests
        run: node --test tests/integration/agent-integration.test.mjs
        continue-on-error: true
