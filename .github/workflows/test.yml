name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run unit tests (no API dependencies)
        run: |
          node --test tests/unit/agent-engine.test.mjs
          node --test tests/unit/cli-and-final.test.mjs
          node --test tests/unit/final-batch.test.mjs
          node --test tests/unit/final-push.test.mjs
          node --test tests/unit/privacy.test.mjs
      - name: Run integration tests
        run: |
          node --test tests/integration/agent-integration.test.mjs
        continue-on-error: true
